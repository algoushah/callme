<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#060613">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="CallMe">
<title>📞 CallMe</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.21.0.js"></script>
<style>
/* ===== RESET & VARIABLES ===== */
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root {
  --bg:     #060613;
  --bg2:    #0d0d2b;
  --cyan:   #00e5ff;
  --purple: #7c3aed;
  --amber:  #f59e0b;
  --green:  #22c55e;
  --red:    #ef4444;
  --text:   #e2e8f0;
  --text2:  #64748b;
  --glass:  rgba(255,255,255,0.04);
  --border: rgba(0,229,255,0.15);
}

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, 'Segoe UI', Tahoma, sans-serif;
}

/* Animated BG */
body::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse at 15% 60%, rgba(124,58,237,0.1) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 15%, rgba(0,229,255,0.07) 0%, transparent 55%);
}

/* ===== SCREENS ===== */
.screen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 1;
  transition: opacity .3s, transform .3s;
}
.screen.hidden { opacity: 0; pointer-events: none; transform: scale(.97); }

/* ===== LOGIN ===== */
#screen-login .card {
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 28px;
  padding: 40px 28px 32px;
  width: calc(100% - 40px);
  max-width: 360px;
  backdrop-filter: blur(24px);
  text-align: center;
}
.logo-icon { font-size: 52px; line-height: 1; margin-bottom: 6px; }
.logo-title {
  font-size: 30px; font-weight: 800; letter-spacing: -1px;
  background: linear-gradient(135deg, var(--cyan) 0%, var(--purple) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.logo-sub { font-size: 13px; color: var(--text2); margin-bottom: 32px; margin-top: 4px; }

.field { margin-bottom: 14px; text-align: right; }
.field label {
  display: block; font-size: 11px; color: var(--cyan);
  letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 7px; font-weight: 600;
}
.field input {
  width: 100%;
  background: rgba(0,229,255,0.04);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 13px 16px;
  color: var(--text);
  font-size: 15px;
  outline: none;
  direction: ltr;
  text-align: center;
  transition: border-color .2s, box-shadow .2s;
}
.field input:focus {
  border-color: var(--cyan);
  box-shadow: 0 0 0 3px rgba(0,229,255,0.1);
}
.field input::placeholder { color: var(--text2); }

.btn-go {
  width: 100%; margin-top: 6px;
  padding: 14px;
  background: linear-gradient(135deg, var(--cyan), var(--purple));
  border: none; border-radius: 14px;
  color: #fff; font-size: 16px; font-weight: 700;
  cursor: pointer; transition: opacity .2s, transform .1s;
}
.btn-go:active { transform: scale(.97); }
.btn-go:disabled { opacity: .45; cursor: not-allowed; }

/* ===== MAIN SCREEN ===== */
#screen-main { justify-content: flex-start; padding: 0; }

.top-bar {
  width: 100%;
  padding: env(safe-area-inset-top, 12px) 16px 12px;
  padding-top: max(env(safe-area-inset-top, 0px), 12px);
  background: rgba(6,6,19,.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
  position: relative; z-index: 10;
  flex-shrink: 0;
}

.p-avatar {
  width: 44px; height: 44px; border-radius: 50%;
  background: linear-gradient(135deg, var(--purple), var(--cyan));
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 800; flex-shrink: 0;
  position: relative;
}
.dot {
  position: absolute; bottom: 1px; right: 1px;
  width: 11px; height: 11px; border-radius: 50%;
  border: 2px solid var(--bg);
  background: var(--text2);
  transition: background .4s;
}
.dot.on { background: var(--green); }

.p-info { flex: 1; min-width: 0; }
.p-name { font-size: 16px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.p-status { font-size: 12px; color: var(--text2); transition: color .3s; }
.p-status.on { color: var(--green); }

.top-actions { display: flex; gap: 8px; flex-shrink: 0; }
.act-btn {
  width: 40px; height: 40px; border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--glass);
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; cursor: pointer;
  transition: all .2s;
}
.act-btn:active { transform: scale(.9); }
.act-btn.voice { background: rgba(34,197,94,.12); border-color: rgba(34,197,94,.3); }
.act-btn.video { background: rgba(0,229,255,.08); border-color: rgba(0,229,255,.3); }

/* MESSAGES */
.msgs {
  flex: 1; width: 100%; overflow-y: auto;
  padding: 14px 14px 8px;
  display: flex; flex-direction: column; gap: 8px;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
.msgs::-webkit-scrollbar { width: 3px; }
.msgs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.bubble-wrap { display: flex; flex-direction: column; }
.bubble-wrap.me { align-items: flex-start; }
.bubble-wrap.them { align-items: flex-end; }

.bubble {
  max-width: 74%; padding: 10px 14px;
  border-radius: 20px; font-size: 14px; line-height: 1.55;
  word-break: break-word;
}
.bubble.me {
  background: linear-gradient(135deg, rgba(124,58,237,.7), rgba(0,229,255,.35));
  border: 1px solid rgba(0,229,255,.2);
  border-bottom-right-radius: 5px;
}
.bubble.them {
  background: rgba(255,255,255,.07);
  border: 1px solid rgba(255,255,255,.1);
  border-bottom-left-radius: 5px;
}
.btime { font-size: 10px; color: rgba(255,255,255,.3); margin-top: 3px; }

.sys {
  align-self: center;
  font-size: 11px; color: var(--text2);
  background: var(--glass); border: 1px solid var(--border);
  padding: 5px 14px; border-radius: 20px;
}

.empty-state {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: var(--text2); text-align: center; padding: 40px; gap: 12px;
}
.empty-state .ei { font-size: 52px; }
.empty-state p { font-size: 14px; line-height: 1.7; }

/* INPUT BAR */
.input-bar {
  width: 100%;
  padding: 10px 14px;
  padding-bottom: max(env(safe-area-inset-bottom, 0px), 10px);
  background: rgba(6,6,19,.95);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex; gap: 10px; align-items: flex-end;
  flex-shrink: 0;
}
.msg-in {
  flex: 1;
  background: rgba(255,255,255,.05);
  border: 1px solid var(--border);
  border-radius: 22px;
  padding: 10px 15px;
  color: var(--text); font-size: 14px;
  outline: none; resize: none;
  max-height: 96px; overflow-y: auto;
  transition: border-color .2s;
  direction: rtl;
  scrollbar-width: none;
  line-height: 1.5;
}
.msg-in:focus { border-color: var(--cyan); }
.msg-in::placeholder { color: var(--text2); }

.send-btn {
  width: 42px; height: 42px; flex-shrink: 0;
  border-radius: 50%; border: none;
  background: linear-gradient(135deg, var(--cyan), var(--purple));
  color: #fff; font-size: 17px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform .1s;
}
.send-btn:active { transform: scale(.88); }

/* ===== INCOMING CALL ===== */
#screen-incoming { background: rgba(6,6,19,.98); }
.in-card { text-align: center; padding: 20px; }
.big-avatar {
  width: 110px; height: 110px; border-radius: 50%;
  background: linear-gradient(135deg, var(--purple), var(--cyan));
  display: flex; align-items: center; justify-content: center;
  font-size: 44px; font-weight: 800;
  margin: 0 auto 24px;
  animation: ring 1.6s infinite;
}
@keyframes ring {
  0%   { box-shadow: 0 0 0 0   rgba(0,229,255,.5); }
  70%  { box-shadow: 0 0 0 32px rgba(0,229,255,0);  }
  100% { box-shadow: 0 0 0 0   rgba(0,229,255,0);   }
}
.in-label { font-size: 12px; color: var(--text2); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 10px; }
.in-name  { font-size: 34px; font-weight: 800; margin-bottom: 8px; }
.in-type  { font-size: 15px; color: var(--cyan); margin-bottom: 56px; }
.in-btns  { display: flex; gap: 48px; justify-content: center; }
.in-btn-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.in-btn {
  width: 70px; height: 70px; border-radius: 50%; border: none;
  font-size: 30px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform .1s;
}
.in-btn:active { transform: scale(.9); }
.in-btn.acc { background: var(--green); }
.in-btn.rej { background: var(--red); }
.in-btn-label { font-size: 13px; color: var(--text2); }

/* ===== IN-CALL SCREEN ===== */
#screen-call { background: #000; padding: 0; }
.call-wrap { position: relative; width: 100%; height: 100%; overflow: hidden; }

#remote-vid {
  position: absolute; inset: 0;
  background: #111;
  display: flex; align-items: center; justify-content: center;
  font-size: 90px;
}
#local-vid {
  position: absolute; bottom: 110px; right: 14px;
  width: 96px; height: 136px;
  border-radius: 14px; overflow: hidden;
  background: #1a1a2e;
  border: 2px solid var(--cyan);
  display: flex; align-items: center; justify-content: center;
  font-size: 30px; color: var(--text2);
  z-index: 5;
}
.call-timer-el {
  position: absolute; top: 52px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,.55); backdrop-filter: blur(10px);
  padding: 6px 22px; border-radius: 24px;
  font-size: 17px; color: #fff; font-variant-numeric: tabular-nums;
  z-index: 5;
}
.call-ctrls {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 20px 20px 40px;
  background: linear-gradient(to top, rgba(0,0,0,.85) 0%, transparent 100%);
  display: flex; justify-content: center; align-items: center;
  gap: 22px; z-index: 5;
}
.ctrl {
  width: 56px; height: 56px; border-radius: 50%; border: none;
  background: rgba(255,255,255,.15); backdrop-filter: blur(10px);
  color: #fff; font-size: 22px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s;
}
.ctrl.muted  { background: var(--amber); }
.ctrl.camoff { background: rgba(239,68,68,.5); }
.ctrl.end { width: 66px; height: 66px; font-size: 26px; background: var(--red); }
.ctrl:active { transform: scale(.88); }

/* ===== TOAST ===== */
.toast {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
  background: rgba(0,229,255,.92); color: #000;
  padding: 10px 22px; border-radius: 28px;
  font-size: 13px; font-weight: 700;
  z-index: 9999; opacity: 0; pointer-events: none;
  white-space: nowrap; transition: opacity .25s;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- ===================== SCREEN 1: LOGIN ===================== -->
<div id="screen-login" class="screen">
  <div class="card">
    <div class="logo-icon">📞</div>
    <div class="logo-title">CallMe</div>
    <div class="logo-sub">اتصال خاص بينك وبين صاحبك</div>

    <div class="field">
      <label>اسمك</label>
      <input id="inp-me" type="text" placeholder="أدخل اسمك" maxlength="20" autocomplete="off">
    </div>
    <div class="field">
      <label>اسم الطرف الثاني</label>
      <input id="inp-partner" type="text" placeholder="اسم صاحبك" maxlength="20" autocomplete="off">
    </div>
    <button class="btn-go" id="login-btn" onclick="doLogin()">دخول ←</button>
  </div>
</div>

<!-- ===================== SCREEN 2: MAIN ===================== -->
<div id="screen-main" class="screen hidden">
  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="p-avatar" id="p-avatar">
      ?
      <span class="dot" id="p-dot"></span>
    </div>
    <div class="p-info">
      <div class="p-name" id="p-name">—</div>
      <div class="p-status" id="p-status">غير متصل</div>
    </div>
    <div class="top-actions">
      <div class="act-btn voice" onclick="startCall('voice')" title="صوت">📞</div>
      <div class="act-btn video" onclick="startCall('video')" title="فيديو">🎥</div>
    </div>
  </div>

  <!-- MESSAGES -->
  <div class="msgs" id="msgs">
    <div class="empty-state" id="empty-state">
      <div class="ei">💬</div>
      <p>ابدأ المحادثة!<br><span style="color:var(--cyan)">أرسل رسالة أو اتصل بصاحبك</span></p>
    </div>
  </div>

  <!-- INPUT -->
  <div class="input-bar">
    <button class="send-btn" onclick="sendMsg()">➤</button>
    <textarea class="msg-in" id="msg-in" placeholder="اكتب رسالة..." rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"
      oninput="autoH(this)"></textarea>
  </div>
</div>

<!-- ===================== SCREEN 3: INCOMING ===================== -->
<div id="screen-incoming" class="screen hidden">
  <div class="in-card">
    <div class="big-avatar" id="caller-av">?</div>
    <div class="in-label">مكالمة واردة</div>
    <div class="in-name"  id="caller-nm">—</div>
    <div class="in-type"  id="caller-tp">📞 مكالمة صوتية</div>
    <div class="in-btns">
      <div class="in-btn-wrap">
        <button class="in-btn rej" onclick="rejectCall()">📵</button>
        <div class="in-btn-label">رفض</div>
      </div>
      <div class="in-btn-wrap">
        <button class="in-btn acc" onclick="acceptCall()">📞</button>
        <div class="in-btn-label">قبول</div>
      </div>
    </div>
  </div>
</div>

<!-- ===================== SCREEN 4: IN-CALL ===================== -->
<div id="screen-call" class="screen hidden">
  <div class="call-wrap">
    <div id="remote-vid">
      <div id="remote-placeholder" style="display:flex;flex-direction:column;align-items:center;gap:16px;color:#444;">
        <div style="font-size:80px">👤</div>
        <div style="font-size:14px">في انتظار الاتصال...</div>
      </div>
    </div>
    <div id="local-vid">
      <div id="local-placeholder" style="font-size:28px;color:#555">🤳</div>
    </div>
    <div class="call-timer-el" id="call-timer">00:00</div>
    <div class="call-ctrls">
      <button class="ctrl" id="btn-mute" onclick="toggleMute()" title="كتم">🎙️</button>
      <button class="ctrl end"           onclick="endCall()"    title="إنهاء">📵</button>
      <button class="ctrl" id="btn-cam"  onclick="toggleCam()"  title="كاميرا">📷</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
// CONFIG — Supabase
// ═══════════════════════════════════════════
const SB_URL = 'https://untykvvahfwvdjbzbpud.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVudHlrdnZhaGZ3dmRqYnpicHVkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1NDQ2OTUsImV4cCI6MjA5MjEyMDY5NX0.Nf_-DMjGgv2liMP26lKYaVHFAShbLDuwVniuj8dJ-Qs';
const db = supabase.createClient(SB_URL, SB_KEY);

// ═══════════════════════════════════════════
// CONFIG — Agora
// ═══════════════════════════════════════════
const AGORA_APP_ID = '6d3dc26748c546cd86766afb0d1a9c65';

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let ME = '', PARTNER = '';
let callId = null, callType = '';
let muted = false, camOff = false;
let timerIv = null, timerSec = 0;

// Agora state
let agoraClient      = null;
let localAudioTrack  = null;
let localVideoTrack  = null;

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
const $ = id => document.getElementById(id);
const qs = s => document.querySelector(s);

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  $(id).classList.remove('hidden');
}

let toastTm;
function toast(msg, ms = 2800) {
  const el = $('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTm);
  toastTm = setTimeout(() => el.classList.remove('show'), ms);
}

function initials(n) { return n ? n[0].toUpperCase() : '?'; }

function autoH(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 96) + 'px';
}

function fmtTime(s) {
  return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
}

function fmtMsgTime(iso) {
  return new Date(iso).toLocaleTimeString('ar', { hour:'2-digit', minute:'2-digit' });
}

// ═══════════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════════
async function doLogin() {
  const me = $('inp-me').value.trim();
  const pt = $('inp-partner').value.trim();
  if (!me || !pt)    { toast('⚠️ أدخل الاسمين'); return; }
  if (me === pt)     { toast('⚠️ الاسمان يجب أن يختلفا'); return; }

  const btn = $('login-btn');
  btn.disabled = true;
  btn.textContent = '⏳ جاري الدخول...';

  ME = me; PARTNER = pt;

  try {
    await setOnline();

    // Init UI
    $('p-name').textContent  = PARTNER;
    $('p-avatar').innerHTML  = initials(PARTNER) + '<span class="dot" id="p-dot"></span>';

    showScreen('screen-main');

    subscribePresence();
    subscribeMessages();
    subscribeCalls();
    await loadMessages();
    checkPartnerOnline();

    // Heartbeat every 25s
    setInterval(setOnline, 25000);

    // Offline on leave
    window.addEventListener('beforeunload', setOffline);
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) setOffline(); else setOnline();
    });

    toast('✅ أهلاً ' + ME + '!');
  } catch (e) {
    toast('❌ ' + (e.message || 'خطأ'));
    btn.disabled = false;
    btn.textContent = 'دخول ←';
  }
}

async function setOnline() {
  await db.from('call_users').upsert(
    { username: ME, status: 'online', updated_at: new Date().toISOString() },
    { onConflict: 'username' }
  );
}

async function setOffline() {
  if (!ME) return;
  await db.from('call_users').upsert(
    { username: ME, status: 'offline', updated_at: new Date().toISOString() },
    { onConflict: 'username' }
  );
}

// ═══════════════════════════════════════════
// PRESENCE
// ═══════════════════════════════════════════
function subscribePresence() {
  db.channel('presence:' + [ME, PARTNER].sort().join('_'))
    .on('postgres_changes', {
      event: '*', schema: 'public',
      table: 'call_users',
      filter: `username=eq.${PARTNER}`
    }, p => updateStatus(p.new?.status))
    .subscribe();
}

async function checkPartnerOnline() {
  const { data } = await db.from('call_users')
    .select('status, updated_at')
    .eq('username', PARTNER)
    .single();
  if (!data) return;
  const age = (Date.now() - new Date(data.updated_at).getTime()) / 1000;
  updateStatus(age < 60 ? data.status : 'offline');
}

function updateStatus(status) {
  const dot = $('p-dot');
  const el  = $('p-status');
  const on  = status === 'online';
  if (dot) { dot.className = 'dot' + (on ? ' on' : ''); }
  el.textContent = on ? '● متصل الآن' : 'غير متصل';
  el.className   = 'p-status' + (on ? ' on' : '');
}

// ═══════════════════════════════════════════
// MESSAGES
// ═══════════════════════════════════════════
async function loadMessages() {
  const { data } = await db.from('call_messages')
    .select('*')
    .or(
      `and(sender.eq.${ME},receiver.eq.${PARTNER}),` +
      `and(sender.eq.${PARTNER},receiver.eq.${ME})`
    )
    .order('created_at', { ascending: true })
    .limit(80);
  if (data?.length) {
    $('empty-state').style.display = 'none';
    data.forEach(m => renderMsg(m));
  }
}

function subscribeMessages() {
  db.channel('msgs:' + [ME, PARTNER].sort().join('_'))
    .on('postgres_changes', {
      event: 'INSERT', schema: 'public', table: 'call_messages'
    }, p => {
      const m = p.new;
      const ok = (m.sender===PARTNER&&m.receiver===ME)||(m.sender===ME&&m.receiver===PARTNER);
      if (ok && m.sender === PARTNER) renderMsg(m);
    })
    .subscribe();
}

async function sendMsg() {
  const el  = $('msg-in');
  const txt = el.value.trim();
  if (!txt) return;
  el.value = ''; el.style.height = 'auto';

  const m = { sender:ME, receiver:PARTNER, content:txt, created_at: new Date().toISOString() };
  renderMsg(m, true);
  const { error } = await db.from('call_messages').insert(m);
  if (error) toast('❌ فشل الإرسال');
}

function renderMsg(m) {
  const area  = $('msgs');
  const es    = $('empty-state');
  if (es) es.style.display = 'none';

  const mine  = m.sender === ME;
  const wrap  = document.createElement('div');
  wrap.className = 'bubble-wrap ' + (mine ? 'me' : 'them');

  const bub   = document.createElement('div');
  bub.className = 'bubble ' + (mine ? 'me' : 'them');
  bub.textContent = m.content;

  const t     = document.createElement('div');
  t.className = 'btime';
  t.textContent = fmtMsgTime(m.created_at);

  wrap.appendChild(bub);
  wrap.appendChild(t);
  area.appendChild(wrap);
  area.scrollTop = area.scrollHeight;
}

function addSysMsg(txt) {
  const area = $('msgs');
  const el   = document.createElement('div');
  el.className = 'sys'; el.textContent = txt;
  area.appendChild(el);
  area.scrollTop = area.scrollHeight;
}

// ═══════════════════════════════════════════
// CALLS
// ═══════════════════════════════════════════
function subscribeCalls() {
  db.channel('calls:' + [ME, PARTNER].sort().join('_'))
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'calls' }, p => {
      const c = p.new;
      if (c.callee === ME && c.status === 'pending') showIncoming(c);
    })
    .on('postgres_changes', { event:'UPDATE', schema:'public', table:'calls' }, p => {
      const c = p.new;
      if (c.id !== callId) return;
      if (c.status === 'accepted' && c.caller === ME) startCallUI(c);
      if (c.status === 'rejected') { toast('📵 رُفضت المكالمة'); resetCall(); showScreen('screen-main'); }
      if (c.status === 'ended')    { endCallUI(); }
    })
    .subscribe();
}

async function startCall(type) {
  // Check partner online
  const { data } = await db.from('call_users').select('status,updated_at').eq('username',PARTNER).single();
  const age = data ? (Date.now()-new Date(data.updated_at).getTime())/1000 : 9999;
  if (!data || age>60 || data.status!=='online') { toast('⚠️ '+PARTNER+' غير متصل الآن'); return; }

  callType = type;
  const roomId = 'room_' + Math.random().toString(36).slice(2, 11);

  const { data: call, error } = await db.from('calls').insert({
    caller: ME, callee: PARTNER,
    status: 'pending', type, room_id: roomId,
    created_at: new Date().toISOString()
  }).select().single();

  if (error) { toast('❌ فشل الاتصال'); return; }
  callId = call.id;
  toast((type==='video'?'🎥':'📞') + ' جاري الاتصال بـ '+PARTNER+'...', 6000);
}

function showIncoming(call) {
  callId   = call.id;
  callType = call.type || 'voice';
  $('caller-av').textContent = initials(call.caller);
  $('caller-nm').textContent = call.caller;
  $('caller-tp').textContent = call.type==='video' ? '📹 مكالمة فيديو' : '📞 مكالمة صوتية';
  showScreen('screen-incoming');
}

async function acceptCall() {
  if (!callId) return;
  await db.from('calls').update({ status:'accepted' }).eq('id', callId);
  const { data } = await db.from('calls').select('*').eq('id', callId).single();
  if (data) startCallUI(data);
}

async function rejectCall() {
  if (!callId) return;
  await db.from('calls').update({ status:'rejected' }).eq('id', callId);
  resetCall(); showScreen('screen-main'); toast('📵 رُفضت المكالمة');
}

function startCallUI(call) {
  showScreen('screen-call');
  timerSec = 0;
  $('call-timer').textContent = '00:00';
  timerIv = setInterval(() => {
    timerSec++;
    $('call-timer').textContent = fmtTime(timerSec);
  }, 1000);
  addSysMsg((callType==='video'?'🎥':'📞') + ' بدأت المكالمة');
  initAgora(call.room_id, call.type || 'voice');
}

async function endCall() {
  if (callId) await db.from('calls').update({ status:'ended' }).eq('id', callId);
  await leaveAgora();
  endCallUI();
}

function endCallUI() {
  const dur = fmtTime(timerSec);
  clearInterval(timerIv); timerIv = null;
  addSysMsg('📵 انتهت المكالمة — المدة: ' + dur);
  // Reset video containers
  $('remote-vid').innerHTML =
    '<div id="remote-placeholder" style="display:flex;flex-direction:column;align-items:center;gap:16px;color:#444;">' +
    '<div style="font-size:80px">👤</div>' +
    '<div style="font-size:14px">في انتظار الاتصال...</div></div>';
  $('local-vid').innerHTML = '<div id="local-placeholder" style="font-size:28px;color:#555">🤳</div>';
  resetCall();
  showScreen('screen-main');
  toast('انتهت المكالمة — ' + dur);
}

function resetCall() {
  callId = null; callType = '';
  timerSec = 0; muted = false; camOff = false;
  $('btn-mute').textContent = '🎙️';
  $('btn-mute').classList.remove('muted');
  $('btn-cam').textContent  = '📷';
  $('btn-cam').classList.remove('camoff');
}

function toggleMute() {
  muted = !muted;
  $('btn-mute').textContent = muted ? '🔇' : '🎙️';
  $('btn-mute').classList.toggle('muted', muted);
  if (localAudioTrack) localAudioTrack.setMuted(muted);
  toast(muted ? '🔇 الميكروفون مغلق' : '🎙️ الميكروفون مفتوح', 1500);
}

function toggleCam() {
  camOff = !camOff;
  $('btn-cam').textContent = camOff ? '🚫' : '📷';
  $('btn-cam').classList.toggle('camoff', camOff);
  if (localVideoTrack) localVideoTrack.setMuted(camOff);
  toast(camOff ? '📵 الكاميرا مغلقة' : '📷 الكاميرا مفتوحة', 1500);
}

// ═══════════════════════════════════════════
// AGORA — الصوت والفيديو
// ═══════════════════════════════════════════
async function initAgora(roomId, type) {
  try {
    // إنشاء Client
    agoraClient = AgoraRTC.createClient({ mode: 'rtc', codec: 'vp8' });
    AgoraRTC.setLogLevel(4); // Quiet logs

    // عند وصول مستخدم آخر
    agoraClient.on('user-published', async (user, mediaType) => {
      await agoraClient.subscribe(user, mediaType);

      if (mediaType === 'video') {
        // إخفاء placeholder وعرض الفيديو
        const ph = $('remote-placeholder');
        if (ph) ph.style.display = 'none';
        user.videoTrack.play('remote-vid');
      }
      if (mediaType === 'audio') {
        user.audioTrack.play();
      }
    });

    agoraClient.on('user-unpublished', (user, mediaType) => {
      if (mediaType === 'video') {
        const ph = $('remote-placeholder');
        if (ph) ph.style.display = 'flex';
      }
    });

    agoraClient.on('user-left', () => {
      toast('📵 ' + PARTNER + ' غير الاتصال', 3000);
      endCall();
    });

    // UID عشوائي رقمي
    const uid = Math.floor(Math.random() * 100000);

    // الدخول للغرفة — token=null لـ Testing Mode
    await agoraClient.join(AGORA_APP_ID, roomId, e8b8a45c9806440bb11ce34b3bfc53b4, uid);

    // تشغيل الميكروفون دائماً
    localAudioTrack = await AgoraRTC.createMicrophoneAudioTrack();

    if (type === 'video') {
      // تشغيل الكاميرا
      localVideoTrack = await AgoraRTC.createCameraVideoTrack();

      // عرض الكاميرا المحلية في الصندوق الصغير
      const lph = $('local-placeholder');
      if (lph) lph.style.display = 'none';
      localVideoTrack.play('local-vid');

      await agoraClient.publish([localAudioTrack, localVideoTrack]);
    } else {
      // صوت فقط — أظهر أيقونة صوت
      $('remote-placeholder').innerHTML =
        '<div style="font-size:72px">🎙️</div><div style="font-size:14px;color:#00e5ff;margin-top:12px">مكالمة صوتية</div>';
      $('local-vid').innerHTML = '<div style="font-size:26px">🎙️</div>';
      await agoraClient.publish([localAudioTrack]);
    }

    toast('✅ متصل بـ Agora', 2000);

  } catch (err) {
    console.error('Agora error:', err);
    toast('❌ Agora: ' + (err.message || err), 4000);
  }
}

async function leaveAgora() {
  try {
    if (localAudioTrack) { localAudioTrack.stop(); localAudioTrack.close(); localAudioTrack = null; }
    if (localVideoTrack) { localVideoTrack.stop(); localVideoTrack.close(); localVideoTrack = null; }
    if (agoraClient)     { await agoraClient.leave(); agoraClient = null; }
  } catch(e) { console.warn('leaveAgora:', e); }
}
</script>
